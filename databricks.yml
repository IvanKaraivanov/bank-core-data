# This is a Databricks asset bundle definition for bank_core_data.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bank_core_data
  uuid: 73bb843c-f82a-48c6-91c4-d678b5d8e4d9

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405618514094452.12.azuredatabricks.net
    variables:
      catalog: bankcore_dev
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-7405618514094452.12.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/nextgenlearning@ivanakaraivanovgmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Users/nextgenlearning@ivanakaraivanovgmail.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bankcore_dev
      schema: prod
    permissions:
      - user_name: nextgenlearning@ivanakaraivanovgmail.onmicrosoft.com
        level: CAN_MANAGE
