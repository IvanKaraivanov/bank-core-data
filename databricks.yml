# ============================================================================
# Databricks Asset Bundle (DAB) Configuration for Bank Core Data Engineering
# ============================================================================
bundle:
  name: bank_core_data
  uuid: 73bb843c-f82a-48c6-91c4-d678b5d8e4d9

# Include all declarative definitions for Jobs, DLTs, and Pipelines
include:
  - resources/*.yml

# Define how the custom Python code (src/) is packaged before deployment
artifacts:
  python_artifact:
    type: whl
    # We use 'uv' for lightning-fast Python package building
    build: uv build --wheel

# Global variables injected into our Python code and YAML resources.
# Note: We only parameterize the 'catalog'. The schemas (bronze, silver, gold) 
# remain identical across all environments thanks to our Medallion Architecture.
variables:
  catalog:
    description: "The target Unity Catalog name for the specific environment"

# ============================================================================
# Environment Targets (Mapped to our Azure Databricks Workspaces)
# ============================================================================
targets:
  # --------------------------------------------------------------------------
  # 1. Development Environment (Personal/Ad-hoc testing)
  # --------------------------------------------------------------------------
  dev:
    # 'development' mode automatically prefixes resource names with '[dev]' 
    # and pauses active schedules/triggers to prevent accidental runs.
    mode: development
    default: true
    workspace:
      host: https://adb-7405618514094452.12.azuredatabricks.net
    variables:
      catalog: bankcore_dev

  # --------------------------------------------------------------------------
  # 2. Test Environment (Staging / CI-CD Deployment)
  # --------------------------------------------------------------------------
  test:
    # 'production' mode deploys resources exactly as defined (no prefixes)
    # and activates all schedules/triggers.
    mode: production
    workspace:
      host: https://adb-7405606568153641.1.azuredatabricks.net
    variables:
      catalog: bankcore_test