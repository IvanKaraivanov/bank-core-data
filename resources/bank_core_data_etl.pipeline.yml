# The main pipeline for bank_core_data

resources:
  pipelines:
    bank_core_data_etl:
      name: bank_core_data_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/bank_core_data_etl"

      libraries:
        - glob:
            include: ../src/bank_core_data_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
